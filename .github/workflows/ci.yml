name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Tests & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql
          coverage: xdebug

      - run: composer install --no-interaction --prefer-dist

      - name: Install Castor
        run: curl -Ls https://castor.jolicode.com/install | bash && mv ~/.local/bin/castor /usr/local/bin/castor

      - name: Run CI checks
        run: castor ci
